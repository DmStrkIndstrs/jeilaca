                        <div className="glass-panel rounded-2xl shadow-xl p-8 mb-8 border border-slate-200 bg-white text-center flex flex-col items-center justify-center min-h-[120px]">
                            <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-3">{currentData.title}</h2>
                            <p className="text-slate-500 font-medium">{currentData.subtitle}</p>
                        </div>

                        {/* Notice Section */}
                        <div className="glass-panel rounded-2xl shadow-lg p-6 md:p-8 mb-6 border border-slate-200 bg-white">
                            <h3 className="text-xl font-bold mb-5 flex items-center text-slate-800">
                                <span className="bg-blue-600 w-2 h-6 rounded-full mr-3"></span>
                                학습 안내 및 중요 공지
                            </h3>
                            <div className="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                {currentData.notices.map((notice, idx) => (
                                    <p key={idx} className="text-sm md:text-base text-slate-700 leading-relaxed flex items-start">
                                        <span className="mr-2 text-blue-600 font-bold">•</span>
                                        <span dangerouslySetInnerHTML={{__html: notice}}></span>
                                    </p>
                                ))}
                            </div>
                        </div>

                        {/* Exam Scope Section */}
                        <div className="glass-panel rounded-2xl shadow-lg p-6 md:p-8 mb-8 border border-slate-200 bg-white">
                            <h3 className="text-xl font-bold mb-5 flex items-center text-slate-800">
                                <span className="bg-indigo-600 w-2 h-6 rounded-full mr-3"></span>
                                📋 중간고사 예상 시험 범위
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                    <h4 className="font-bold text-blue-800 mb-3 border-b border-blue-200 pb-2 flex justify-between items-center">
                                        <span>[A] 물리 파트</span>
                                        <span className="text-xs bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">{currentData.examScope.physics.length}단원</span>
                                    </h4>
                                    <ul className="text-sm text-slate-700 space-y-2">
                                        {currentData.examScope.physics.map((item, i) => <li key={i} className="leading-snug">✓ {item}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                    <h4 className="font-bold text-rose-800 mb-3 border-b border-rose-200 pb-2 flex justify-between items-center">
                                        <span>[B] 화학 파트</span>
                                        <span className="text-xs bg-rose-200 text-rose-800 px-2 py-0.5 rounded-full">{currentData.examScope.chemistry.length}단원</span>
                                    </h4>
                                    <ul className="text-sm text-slate-700 space-y-2">
                                        {currentData.examScope.chemistry.map((item, i) => <li key={i} className="leading-snug">✓ {item}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                    <h4 className="font-bold text-emerald-800 mb-3 border-b border-emerald-200 pb-2 flex justify-between items-center">
                                        <span>[C] 생명 파트</span>
                                        <span className="text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full">{currentData.examScope.biology.length}단원</span>
                                    </h4>
                                    <ul className="text-sm text-slate-700 space-y-2">
                                        {currentData.examScope.biology.map((item, i) => <li key={i} className="leading-snug">✓ {item}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                    <h4 className="font-bold text-purple-800 mb-3 border-b border-purple-200 pb-2 flex justify-between items-center">
                                        <span>[D] 지구 파트</span>
                                        <span className="text-xs bg-purple-200 text-purple-800 px-2 py-0.5 rounded-full">{currentData.examScope.earth.length}단원</span>
                                    </h4>
                                    <ul className="text-sm text-slate-700 space-y-2">
                                        {currentData.examScope.earth.map((item, i) => <li key={i} className="leading-snug">✓ {item}</li>)}
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* View Navigation Tabs (Schedule vs Assignments) */}
                        <div className="flex justify-center mb-6 space-x-4">
                            <button 
                                onClick={() => setActiveTab('schedule')}
                                className={`px-6 py-3 rounded-full font-bold shadow-sm transition-all duration-200 border border-slate-200 ${activeTab === 'schedule' ? 'bg-slate-800 text-white scale-105' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                            >
                                🗓️ 주차별 진도표
                            </button>
                            <button 
                                onClick={() => setActiveTab('assignments')}
                                className={`px-6 py-3 rounded-full font-bold shadow-sm transition-all duration-200 border border-slate-200 ${activeTab === 'assignments' ? 'bg-slate-800 text-white scale-105' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                            >
                                ✅ 학생별 과제 현황
                            </button>
                        </div>

                        {/* Tab 1: Schedule Content */}
                        {activeTab === 'schedule' && (
                            <div className="glass-panel rounded-2xl shadow-lg overflow-hidden border border-slate-200 bg-white animate-[fadeIn_0.3s_ease-in-out]">
                                <div className="p-6 md:p-8 border-b border-slate-100 bg-white">
                                    <h3 className="text-xl font-bold flex items-center text-slate-800">
                                        <span className="bg-slate-800 w-2 h-6 rounded-full mr-3"></span>
                                        세부 진도 및 계획
                                    </h3>
                                </div>
                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[800px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-600 text-sm border-y border-slate-200">
                                                <th className="py-4 px-6 font-bold w-16 text-center">회차</th>
                                                <th className="py-4 px-4 font-bold w-24">날짜</th>
                                                <th className="py-4 px-6 font-bold">수업 내용 및 상세 진도</th>
                                                <th className="py-4 px-6 font-bold w-1/4 text-center">과제 (당일 완결)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {currentData.schedule.map((row) => (
                                                <tr key={row.id} className="table-row-hover group">
                                                    <td className="py-4 px-6 text-center">
                                                        <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold border ${getBadgeColor(row.type)}`}>
                                                            {row.id}회
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-4 font-medium text-slate-500">
                                                        {row.date} <span className="text-xs">({row.day})</span>
                                                    </td>
                                                    <td className={`py-4 px-6 font-medium whitespace-pre-line leading-relaxed ${row.type === 'test' ? 'text-red-600 font-bold' : row.type === 'final' ? 'text-slate-900 font-bold' : 'text-slate-800'}`}>
                                                        {row.content}
                                                    </td>
                                                    <td className="py-4 px-6 text-slate-600 text-sm font-medium text-center">
                                                        <span className="bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 inline-block w-full">{row.homework}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Tab 2: Assignment Content */}
                        {activeTab === 'assignments' && (
                            <div className="glass-panel rounded-2xl shadow-lg overflow-hidden border border-slate-200 bg-white animate-[fadeIn_0.3s_ease-in-out]">
                                <div className="p-6 md:p-8 border-b border-slate-100 bg-white flex justify-between items-center flex-wrap gap-4">
                                    <h3 className="text-xl font-bold flex items-center text-slate-800">
                                        <span className="bg-slate-800 w-2 h-6 rounded-full mr-3"></span>
                                        학생별 과제 제출 현황 (총 {currentData.students.length}명)
                                    </h3>
                                    <div className="flex space-x-4 text-sm font-bold bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">
                                        <span className="text-green-600">O : 완료</span>
                                        <span className="text-amber-500">△ : 미흡</span>
                                        <span className="text-slate-400">- : 미제출</span>
                                    </div>
                                </div>
                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[1000px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-600 text-sm border-y border-slate-200">
                                                <th className="py-4 px-6 font-bold text-center w-12">#</th>
                                                <th className="py-4 px-4 font-bold min-w-[200px]">과제명 / 마감일</th>
                                                <th className="py-4 px-4 font-bold text-center border-l border-slate-200">달성률</th>
                                                {currentData.students.map((student, idx) => (
                                                    <th key={idx} className={`py-4 px-2 font-bold text-center min-w-[60px] ${student === '김건우' ? 'text-blue-600 bg-blue-50/50' : ''}`}>
                                                        {student}
                                                        {student === '김건우' && <span className="block text-[10px] text-blue-500 mt-1">신규</span>}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {currentData.assignments.length === 0 && (
                                                <tr><td colSpan={3 + currentData.students.length} className="text-center py-10 text-slate-400">등록된 과제가 없습니다.</td></tr>
                                            )}
                                            {currentData.assignments.map((assignment, index) => {
                                                const progress = calculateProgress(assignment.status);
                                                return (
                                                    <tr key={assignment.id} className="table-row-hover">
                                                        <td className="py-4 px-6 text-center text-slate-400 font-bold">{index + 1}</td>
                                                        <td className="py-4 px-4">
                                                            <div className="font-bold text-slate-800">{assignment.title}</div>
                                                            <div className="text-xs text-slate-500 mt-1 flex items-center">
                                                                <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded mr-2">마감</span> {assignment.dueDate}
                                                            </div>
                                                        </td>
                                                        <td className="py-4 px-4 border-l border-slate-100 text-center">
                                                            <div className="flex flex-col items-center">
                                                                <span className={`text-sm font-bold ${progress.percentage >= 80 ? 'text-green-600' : progress.percentage > 0 ? 'text-blue-600' : 'text-slate-400'}`}>
                                                                    {progress.percentage}%
                                                                </span>
                                                                <div className="w-16 h-1.5 bg-slate-200 rounded-full mt-1 overflow-hidden">
                                                                    <div className={`h-full ${progress.percentage >= 80 ? 'bg-green-500' : 'bg-blue-500'}`} style={{width: `${progress.percentage}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        {currentData.students.map((student, idx) => (
                                                            <td key={idx} className={`py-4 px-2 text-center border-l border-slate-50 border-dashed ${student === '김건우' ? 'bg-blue-50/20' : ''}`}>
                                                                {renderAssignmentStatus(assignment.status?.[student] || '-')}
                                                            </td>
                                                        ))}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* Footer */}
                    <footer className="mt-16 text-center text-slate-400 text-sm pb-8 font-medium">
                        <p>© Hwi-T Science Vessel. All systems online.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
