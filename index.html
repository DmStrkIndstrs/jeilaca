        /* Blinking Cursor */
        .cursor-blink { animation: blink 1s step-end infinite; }

                        { id: 1, date: "3/23", day: "월", content: "[개강] 중3 과학 오리엔테이션 및 1단원 기본 개념 진도", homework: "기본 개념 복습 및 과제 프린트", type: "concept" },
                        { id: 2, date: "3/25", day: "수", content: "1단원 개념 완료 및 대표 유형 문제 풀이", homework: "오투 해당 단원 풀이", type: "concept" },
                        { id: 3, date: "3/30", day: "월", content: "2단원 기본 개념 진도", homework: "개념 복습 프린트", type: "concept" },
                        { id: 4, date: "4/01", day: "수", content: "2단원 개념 완료 및 공통 기출 유형 점검", homework: "오투 해당 단원 풀이", type: "practice" },
                        { id: 5, date: "4/06", day: "월", content: "🏆 1차 누적 점검 테스트 및 오답 클리닉", homework: "오답 노트 작성", type: "test" },
                    ],
                    students: ['(대기중1)', '(대기중2)', '(대기중3)'],
                    assignments: [
                        { id: 1, title: "1주차 오리엔테이션 프린트", dueDate: "3/30 (월)", status: { '(대기중1)': '-', '(대기중2)': '-', '(대기중3)': '-' } },
                    ]
                }
            }
        };
        // =========================================================================

        const { useState } = React;

        function App() {
            const [selectedClassId, setSelectedClassId] = useState('kumho');
            const [activeTab, setActiveTab] = useState('schedule');

            const currentData = appData.classes[selectedClassId];

            // 이미지 다운로드 캡처 기능
            const handleDownloadImage = () => {
                const element = document.getElementById('capture-area');
                if(!element) return;
                
                element.classList.add('capture-mode'); // 캡처용 밝은 배경 강제 적용
                
                window.html2canvas(element, { 
                    backgroundColor: '#f8fafc', // Light Theme Background
                    scale: 2, 
                    useCORS: true 
                }).then(canvas => {
                    const link = document.createElement('a');
                    const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g, '-').replace('.', '');
                    link.download = `CREW_REPORT_${selectedClassId.toUpperCase()}_${today}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    element.classList.remove('capture-mode');
                }).catch(err => {
                    console.error("Capture Failed:", err);
                    element.classList.remove('capture-mode');
                    alert("이미지 캡처 중 오류가 발생했습니다.");
                });
            };

            const getBadgeColor = (type) => {
                switch(type) {
                    case 'concept': return 'bg-emerald-100 text-emerald-800 border-emerald-200';
                    case 'practice': return 'bg-blue-100 text-blue-800 border-blue-200';
                    case 'deep': return 'bg-purple-100 text-purple-800 border-purple-200';
                    case 'ebs': return 'bg-amber-100 text-amber-800 border-amber-200';
                    case 'test': return 'bg-red-100 text-red-800 border-red-200 font-bold';
                    case 'final': return 'bg-slate-800 text-white border-slate-900';
                    default: return 'bg-slate-100 text-slate-800 border-slate-200';
                }
            };

            const renderAssignmentStatus = (status) => {
                if (status === 'O') return <span className="text-emerald-600 font-black text-lg">O</span>;
                if (status === 'X') return <span className="text-red-600 font-black text-lg">X</span>;
                if (status === '△') return <span className="text-amber-500 font-black text-lg">△</span>;
                if (status === 'H') return <span className="text-blue-600 font-black text-lg">H</span>;
                return <span className="text-slate-300 font-bold">-</span>;
            };

            const calculateProgress = (statusObj) => {
                if (!statusObj) return { completed: 0, partial: 0, total: 1, percentage: 0 };
                
                // 'H' (보류) 상태인 학생은 전체 모수(total)에서 제외
                const validStatuses = Object.values(statusObj).filter(s => s !== 'H');
                const total = validStatuses.length;
                if(total === 0) return { completed: 0, partial: 0, total: 0, percentage: 0 };
                
                const completed = validStatuses.filter(s => s === 'O').length;
                const partial = validStatuses.filter(s => s === '△').length;
                const score = completed + (partial * 0.5);
                const percentage = Math.round((score / total) * 100);
                return { completed, partial, total, percentage };
            };

            const calculateStudentProgress = (studentName, assignments) => {
                let totalAssigned = 0;
                let score = 0;
                
                assignments.forEach(a => {
                    const isAssignmentActive = Object.values(a.status || {}).some(val => val === 'O' || val === 'X' || val === '△');
                    if (isAssignmentActive) {
                        const status = a.status?.[studentName];
                        if (status !== 'H') {
                            totalAssigned++;
                            if (status === 'O') score += 1;
                            if (status === '△') score += 0.5;
                        }
                    }
                });
                
                if (totalAssigned === 0) return { percentage: 0, hasData: false };
                return { percentage: Math.round((score / totalAssigned) * 100), hasData: true };
            };

            return (
                <div className="min-h-screen pb-20 relative z-10 selection:bg-blue-200 selection:text-blue-900 text-slate-800">

                                    </svg>

                                </a>

                                    </h3>
                                    
                                    <div className="flex items-center gap-3">
                                        <div className="flex space-x-3 text-[10px] font-mono-tech font-bold bg-slate-50 px-3 py-1.5 rounded-sm border border-slate-200">

                                            <span className="text-amber-500">△:PRTL</span>
                                            <span className="text-blue-600">H:HOLD</span>
                                            <span className="text-slate-400">-:NULL</span>
                                        </div>
                                        {/* Download Button */}
                                        <button 
                                            onClick={handleDownloadImage}
                                            className="no-print flex items-center gap-2 px-3 py-1.5 bg-blue-50 border border-blue-200 text-blue-600 font-mono-tech text-xs tracking-widest hover:bg-blue-600 hover:text-white transition-colors font-bold rounded-sm"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                                                <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1zm9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/>
                                            </svg>
                                            [ CAPTURE ]
                                        </button>

                                <div className="overflow-x-auto custom-scrollbar flex-1 bg-white">

                                                <th className="py-3 px-4 text-center border-l border-slate-200">CMPLTN_%</th>
                                                {currentData.students.map((student, idx) => (
                                                    <th key={idx} className={`py-3 px-2 text-center min-w-[60px] ${student === '김건우' ? 'text-blue-600' : 'text-slate-600'}`}>
