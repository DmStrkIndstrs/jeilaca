                            <button 
                                onClick={() => setActiveTab('schedule')}
                                className={`px-6 py-3 rounded-full font-bold shadow-md transition-all duration-200 ${activeTab === 'schedule' ? 'bg-green-600 text-white scale-105' : 'bg-white text-gray-500 hover:bg-green-50'}`}
                            >
                                🗓️ 주차별 진도표
                            </button>
                            <button 
                                onClick={() => setActiveTab('assignments')}
                                className={`px-6 py-3 rounded-full font-bold shadow-md transition-all duration-200 ${activeTab === 'assignments' ? 'bg-green-600 text-white scale-105' : 'bg-white text-gray-500 hover:bg-green-50'}`}
                            >
                                ✅ 학생별 과제 현황
                            </button>
                        </div>

                        {/* 탭 1: 진도표 내용 */}
                        {activeTab === 'schedule' && (
                            <div className="glass-panel rounded-2xl shadow-lg overflow-hidden border border-gray-100 bg-white animate-[fadeIn_0.3s_ease-in-out]">
                                <div className="p-6 md:p-8 border-b border-gray-100 bg-white">
                                    <h3 className="text-xl font-bold flex items-center text-gray-800">
                                        <span className="bg-green-600 w-2 h-6 rounded-full mr-3"></span>
                                        주차별 세부 진도 및 과제 계획
                                    </h3>
                                </div>
                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[800px]">
                                        <thead>
                                            <tr className="bg-gray-50 text-gray-600 text-sm border-y border-gray-200">
                                                <th className="py-4 px-6 font-bold w-16 text-center">회차</th>
                                                <th className="py-4 px-4 font-bold w-24">날짜</th>
                                                <th className="py-4 px-6 font-bold">수업 내용 및 상세 진도</th>
                                                <th className="py-4 px-6 font-bold w-1/4 text-center">과제 (당일 완결)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {data.schedule.map((row) => (
                                                <tr key={row.id} className="table-row-hover group">
                                                    <td className="py-4 px-6 text-center">
                                                        <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold border ${getBadgeColor(row.type)}`}>
                                                            {row.id}회
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-4 font-medium text-gray-500">
                                                        {row.date} <span className="text-xs">({row.day})</span>
                                                    </td>
                                                    <td className={`py-4 px-6 font-medium whitespace-pre-line leading-relaxed ${row.type === 'test' ? 'text-red-600 font-bold' : row.type === 'final' ? 'text-gray-900 font-bold' : 'text-gray-800'}`}>
                                                        {row.content}
                                                    </td>
                                                    <td className="py-4 px-6 text-gray-600 text-sm font-medium text-center">
                                                        <span className="bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200 inline-block w-full">{row.homework}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* 탭 2: 과제 현황 내용 */}
                        {activeTab === 'assignments' && (
                            <div className="glass-panel rounded-2xl shadow-lg overflow-hidden border border-gray-100 bg-white animate-[fadeIn_0.3s_ease-in-out]">
                                <div className="p-6 md:p-8 border-b border-gray-100 bg-white flex justify-between items-center flex-wrap gap-4">
                                    <h3 className="text-xl font-bold flex items-center text-gray-800">
                                        <span className="bg-blue-600 w-2 h-6 rounded-full mr-3"></span>
                                        학생별 과제 제출 현황 (총 {data.students.length}명)
                                    </h3>
                                    <div className="flex space-x-4 text-sm font-bold bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                                        <span className="text-green-600">O : 완료</span>
                                        <span className="text-amber-500">△ : 미흡</span>
                                        <span className="text-gray-400">- : 미제출</span>
                                    </div>
                                </div>
                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[1000px]">
                                        <thead>
                                            <tr className="bg-gray-50 text-gray-600 text-sm border-y border-gray-200">
                                                <th className="py-4 px-6 font-bold text-center w-12">#</th>
                                                <th className="py-4 px-4 font-bold min-w-[200px]">과제명 / 마감일</th>
                                                <th className="py-4 px-4 font-bold text-center border-l border-gray-200">달성률</th>
                                                {data.students.map((student, idx) => (
                                                    <th key={idx} className={`py-4 px-2 font-bold text-center min-w-[60px] ${student === '김건우' ? 'text-blue-600 bg-blue-50/50' : ''}`}>
                                                        {student}
                                                        {student === '김건우' && <span className="block text-[10px] text-blue-500 mt-1">신규</span>}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {data.assignments.map((assignment, index) => {
                                                const progress = calculateProgress(assignment.status);
                                                return (
                                                    <tr key={assignment.id} className="table-row-hover">
                                                        <td className="py-4 px-6 text-center text-gray-400 font-bold">{index + 1}</td>
                                                        <td className="py-4 px-4">
                                                            <div className="font-bold text-gray-800">{assignment.title}</div>
                                                            <div className="text-xs text-gray-500 mt-1 flex items-center">
                                                                <span className="bg-gray-200 text-gray-600 px-2 py-0.5 rounded mr-2">마감</span> {assignment.dueDate}
                                                            </div>
                                                        </td>
                                                        <td className="py-4 px-4 border-l border-gray-100 text-center">
                                                            <div className="flex flex-col items-center">
                                                                <span className={`text-sm font-bold ${progress.percentage >= 80 ? 'text-green-600' : progress.percentage > 0 ? 'text-blue-600' : 'text-gray-400'}`}>
                                                                    {progress.percentage}%
                                                                </span>
                                                                <div className="w-16 h-1.5 bg-gray-200 rounded-full mt-1 overflow-hidden">
                                                                    <div className={`h-full ${progress.percentage >= 80 ? 'bg-green-500' : 'bg-blue-500'}`} style={{width: `${progress.percentage}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        {data.students.map((student, idx) => (
                                                            <td key={idx} className={`py-4 px-2 text-center border-l border-gray-50 border-dashed ${student === '김건우' ? 'bg-blue-50/20' : ''}`}>
                                                                {renderAssignmentStatus(assignment.status[student])}
                                                            </td>
                                                        ))}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* Footer */}
                    <footer className="mt-12 text-center text-gray-400 text-sm pb-8">
                        <p>© Jeil Academy. 금호고 맞춤형 커리큘럼.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
