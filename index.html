            const currentData = appData.classes[selectedClassId];

            const getBadgeColor = (type) => {
                switch(type) {
                    case 'concept': return 'bg-cyan-900/50 text-cyan-400 border-cyan-700';
                    case 'practice': return 'bg-emerald-900/50 text-emerald-400 border-emerald-700';
                    case 'deep': return 'bg-purple-900/50 text-purple-400 border-purple-700';
                    case 'ebs': return 'bg-amber-900/50 text-amber-400 border-amber-700';
                    case 'test': return 'bg-red-900/60 text-red-400 border-red-600 shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                    case 'final': return 'bg-slate-800 text-slate-200 border-slate-500';
                    default: return 'bg-slate-800 text-slate-400 border-slate-700';
                }
            };

            const renderAssignmentStatus = (status) => {
                if (status === 'O') return <span className="text-emerald-400 font-black text-lg drop-shadow-[0_0_5px_rgba(52,211,153,0.8)]">O</span>;
                if (status === 'X') return <span className="text-red-500 font-black text-lg drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]">X</span>;
                if (status === '△') return <span className="text-amber-400 font-black text-lg">△</span>;
                if (status === 'H') return <span className="text-blue-400 font-black text-lg drop-shadow-[0_0_5px_rgba(96,165,250,0.8)]">H</span>;
                return <span className="text-slate-600 font-bold">-</span>;
            };

            const calculateProgress = (statusObj) => {
                if (!statusObj) return { completed: 0, partial: 0, total: 1, percentage: 0 };
                const total = currentData.students.length;
                if(total === 0) return { completed: 0, partial: 0, total: 0, percentage: 0 };
                
                const completed = Object.values(statusObj).filter(s => s === 'O').length;
                const partial = Object.values(statusObj).filter(s => s === '△').length;
                const percentage = Math.round((completed / total) * 100);
                return { completed, partial, total, percentage };
